<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Focus Tracker app icon
    1024×1024 master, exports cleanly to all required macOS sizes.

    Design:
      • Soft gradient background (orange → red) — signals attention/alert
        without being aggressive. Reads well on both light and dark
        wallpapers.
      • Stylized eye glyph centred — matches the menu bar icon's metaphor
        so users recognize the app in both contexts.
      • Subtle highlight on the eye — gives the icon depth on Retina.
      • Follows Apple's 824×824 safe area inside the 1024 canvas (the
        standard macOS app icon padding ratio).
  -->

  <!-- Definitions -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFB347"/>
      <stop offset="50%" stop-color="#FF7B47"/>
      <stop offset="100%" stop-color="#E84A2D"/>
    </linearGradient>

    <!-- Eye fill gradient — slight depth from top to bottom -->
    <linearGradient id="eyeGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>

    <!-- Iris radial gradient -->
    <radialGradient id="irisGradient" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%"  stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>

    <!-- Soft shadow for the eye -->
    <filter id="eyeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Top sheen gradient -->
    <linearGradient id="sheenGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Background: rounded square with macOS-style 22% corner radius ── -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184"
        fill="url(#bgGradient)"/>

  <!-- Top sheen for depth -->
  <rect x="100" y="100" width="824" height="412" rx="184" ry="184"
        fill="url(#sheenGradient)"/>

  <!-- ── Eye glyph, centred ──────────────────────────────────────────── -->
  <!-- The classic almond eye shape, scaled to fill the safe area -->
  <g filter="url(#eyeShadow)">
    <path d="M 512 280
             C 280 280  140 512  140 512
             C 140 512  280 744  512 744
             C 744 744  884 512  884 512
             C 884 512  744 280  512 280 Z"
          fill="url(#eyeGradient)"/>
  </g>

  <!-- Iris -->
  <circle cx="512" cy="512" r="160" fill="url(#irisGradient)"/>

  <!-- Pupil -->
  <circle cx="512" cy="512" r="70" fill="#000000"/>

  <!-- Catchlight (the sparkle in the eye — adds life) -->
  <circle cx="475" cy="475" r="22" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="490" cy="490" r="8"  fill="#FFFFFF" opacity="0.6"/>

  <!-- ── Subtle "alert" indicator — small triangle in lower right ───── -->
  <!-- Hints at the "thief catcher" aspect without being too on-the-nose -->
  <g transform="translate(720, 720)">
    <circle cx="0" cy="0" r="80" fill="#FFFFFF" opacity="0.95"/>
    <path d="M 0 -42
             L 38 30
             L -38 30 Z"
          fill="#E84A2D"
          stroke="#E84A2D"
          stroke-linejoin="round"
          stroke-width="3"/>
    <rect x="-4" y="-22" width="8" height="28" rx="2" fill="#FFFFFF"/>
    <circle cx="0" cy="14" r="4" fill="#FFFFFF"/>
  </g>
</svg>
